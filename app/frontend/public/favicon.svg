<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Red rounded background -->
  <rect width="64" height="64" rx="12" fill="#dc2626"/>
  <!-- Newspaper / N letter mark -->
  <!-- White newspaper icon: outer sheet -->
  <rect x="10" y="14" width="36" height="38" rx="3" fill="white"/>
  <!-- Fold corner -->
  <polygon points="34,14 46,14 46,26" fill="#dc2626" opacity="0.3"/>
  <!-- Text lines on newspaper -->
  <rect x="14" y="22" width="20" height="3" rx="1.5" fill="#dc2626"/>
  <rect x="14" y="29" width="28" height="2" rx="1" fill="#dc2626" opacity="0.6"/>
  <rect x="14" y="34" width="28" height="2" rx="1" fill="#dc2626" opacity="0.6"/>
  <rect x="14" y="39" width="22" height="2" rx="1" fill="#dc2626" opacity="0.6"/>
  <!-- Live red dot -->
  <circle cx="50" cy="16" r="7" fill="#ef4444"/>
  <circle cx="50" cy="16" r="4" fill="white"/>
  <circle cx="50" cy="16" r="2" fill="#dc2626"/>
</svg>
